<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LEAP/SCAN</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--s1:#0f0f0f;--s2:#141414;--b1:#1e1e1e;--b2:#282828;--t1:#b0b0b0;--t2:#666;--t3:#3a3a3a;--ac:#00ff41;--ac2:#00cc33;--gr:#00e676;--re:#ff1744;--am:#ffab00;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--mono);font-size:12px;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,.012) 3px,rgba(0,255,65,.012) 4px);pointer-events:none;z-index:9999}
.wrap{max-width:1500px;margin:0 auto;padding:16px 12px;position:relative;z-index:1}

.hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--b1)}
.logo{font-size:20px;font-weight:600;letter-spacing:-1px;color:var(--t1)}
.logo .d{color:var(--t3)}.logo .g{color:var(--ac)}
.hdr-r{font-size:9px;color:var(--t3);letter-spacing:.05em;text-align:right}

.panel{background:var(--s1);border:1px solid var(--b1);padding:12px;margin-bottom:8px}
.ticker-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.ticker-row input{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none}
.ticker-row input:focus{border-color:var(--ac)}
.ticker-row input::placeholder{color:var(--t3)}
.ticker-count{font-size:10px;color:var(--t3);white-space:nowrap;flex-shrink:0}

.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.fc{display:flex;flex-direction:column;gap:3px}
.fc label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.fc label small{display:block;color:var(--ac2);font-size:8px;text-transform:none;letter-spacing:0;margin-top:1px}
.fc input,.fc select{background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:var(--mono);font-size:11px;padding:5px 7px;outline:none;width:100%}
.fc input:focus,.fc select:focus{border-color:var(--ac)}

.btn-row{display:flex;gap:8px}
.scan-btn{flex:1;padding:10px;border:1px solid var(--ac);background:transparent;color:var(--ac);font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:background .12s}
.scan-btn:hover{background:rgba(0,255,65,.08)}
.scan-btn:disabled{border-color:var(--b2);color:var(--t3);cursor:not-allowed;background:transparent}
.stop-btn{padding:10px 24px;border:1px solid var(--re);background:transparent;color:var(--re);font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:background .12s}
.stop-btn:hover{background:rgba(255,23,68,.08)}

.prog-wrap{margin-bottom:6px}
.prog-bar{height:2px;background:var(--b1);overflow:hidden}
.prog-fill{height:2px;background:var(--ac);transition:width .3s;width:0}
.prog-text{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:4px}

.status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);padding:5px 0;margin-bottom:6px;min-height:24px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--t3);flex-shrink:0}
.status.running .dot{background:var(--ac);animation:blink 1s infinite}
.status.done .dot{background:var(--gr)}
.status.err .dot{background:var(--re)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.results-hdr{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.stat-v{font-size:14px;font-weight:600}
.sv-g{color:var(--ac)}.sv-w{color:var(--t1)}.sv-gr{color:var(--gr)}

.tbl-wrap{overflow-x:auto;border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{background:var(--s1)}
th{padding:6px 8px;text-align:left;font-size:9px;color:var(--t3);font-weight:500;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--b1)}
th:hover{color:var(--ac)}
th.sorted{color:var(--ac)}
.sa{font-size:7px;margin-left:2px;opacity:.4}
th.sorted .sa{opacity:1}
tbody tr{border-bottom:1px solid var(--b1);transition:background .08s}
tbody tr:hover{background:rgba(0,255,65,.03)}
tbody tr.top3{background:rgba(0,230,118,.03)}
tbody tr.top3:hover{background:rgba(0,230,118,.06)}
td{padding:5px 8px;white-space:nowrap}

.sym{font-size:12px;font-weight:500;color:var(--t1)}
.desc{font-size:9px;color:var(--t3);display:block;max-width:110px;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.score-w{display:flex;align-items:center;gap:5px}
.score-n{font-weight:600;font-size:12px;min-width:22px}
.score-bg{width:28px;height:2px;background:var(--b2)}
.score-fl{height:2px}
.tag{display:inline-block;font-size:8px;padding:1px 4px;border:1px solid;letter-spacing:.03em;margin-left:3px;vertical-align:middle}
.tag-gex{color:var(--gr);border-color:rgba(0,230,118,.3)}.tag-uoa{color:#bb86fc;border-color:rgba(187,134,252,.3)}.tag-vol{color:var(--am);border-color:rgba(255,171,0,.3)}.tag-iv{color:var(--re);border-color:rgba(255,23,68,.3)}
.ok{color:var(--gr)}.warn{color:var(--am)}.bad{color:var(--re)}.dim{color:var(--t3)}.wht{color:var(--t1)}
.rk{font-size:9px;color:var(--t3);min-width:20px;display:inline-block}
.top3 .rk{color:var(--gr)}

.buy-btn{font-size:9px;padding:2px 8px;border:1px solid var(--ac);color:var(--ac);background:transparent;cursor:pointer;font-family:var(--mono);letter-spacing:.04em}
.buy-btn:hover{background:rgba(0,255,65,.12)}
.buy-btn:disabled{border-color:var(--b2);color:var(--t3);cursor:not-allowed}

.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:9px;color:var(--t3);padding:6px 8px;border:1px solid var(--b1);margin-bottom:8px;background:var(--s1)}
.le{display:flex;align-items:center;gap:4px}
.led{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.empty{text-align:center;padding:48px 16px;color:var(--t3)}
.empty .big{font-size:24px;margin-bottom:10px;opacity:.25}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--bg);border:1px solid var(--ac);padding:20px;width:380px;max-width:95vw}
.modal-title{font-size:11px;color:var(--ac);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--b1)}
.modal-contract{font-size:13px;color:var(--t1);margin-bottom:12px;font-weight:500}
.mr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px}
.mr label{color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.mr input{width:90px;text-align:right;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:var(--mono);font-size:11px;padding:4px 6px;outline:none}
.mr input:focus{border-color:var(--ac)}
.mr span{color:var(--t2);font-size:10px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions button{flex:1;padding:8px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.btn-exec{background:transparent;color:var(--ac);border-color:var(--ac)}
.btn-exec:hover{background:rgba(0,255,65,.08)}
.btn-close{background:transparent;color:var(--t3);border-color:var(--b2)}
.btn-close:hover{background:rgba(255,255,255,.03)}
.ord-status{font-size:10px;margin-top:12px;padding:8px;border:1px solid var(--b1);color:var(--t3);min-height:36px;line-height:1.5}
.ord-status.running{border-color:rgba(0,255,65,.3);color:var(--ac)}
.ord-status.filled{border-color:rgba(0,230,118,.4);color:var(--gr)}
.ord-status.error{border-color:rgba(255,23,68,.3);color:var(--re)}

.api-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.api-row label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.api-row input{flex:1;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-family:var(--mono);font-size:10px;padding:5px 7px;outline:none}
.api-row input:focus{border-color:var(--ac)}
.local-badge{font-size:9px;color:var(--ac);border:1px solid var(--ac2);padding:2px 6px;letter-spacing:.04em}

.scoring-key{font-size:9px;color:var(--t3);display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.sk-item{display:flex;align-items:center;gap:4px}
.sk-bar{height:2px;border-radius:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2)}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div>
    <div class="logo">LEAP<span class="d">/</span><span class="g">SCAN</span></div>
    <div class="scoring-key">
      <span class="sk-item"><span class="sk-bar" style="width:28px;background:var(--gr)"></span>GEX 28</span>
      <span class="sk-item"><span class="sk-bar" style="width:20px;background:var(--ac)"></span>IV 20</span>
      <span class="sk-item"><span class="sk-bar" style="width:18px;background:var(--am)"></span>52w 18</span>
      <span class="sk-item"><span class="sk-bar" style="width:15px;background:var(--t2)"></span>Extr 15</span>
      <span class="sk-item"><span class="sk-bar" style="width:19px;background:var(--t3)"></span>OI+Sprd 19</span>
    </div>
  </div>
  <div class="hdr-r">
    <span id="mode-badge"></span>
    <div style="margin-top:4px">2-PASS · GEX-SCORED · LONG CALLS</div>
  </div>
</div>

<div class="panel">
  <div class="ticker-row">
    <input id="tickers-input" placeholder="ALL tickers by default — or paste custom: NVDA,PLTR,AMZN..."/>
    <span class="ticker-count" id="ticker-count"></span>
  </div>

  <div id="api-section" class="api-row" style="display:none">
    <label>API KEY</label>
    <input id="api-key" type="password" value="5eebf62a6678b05dc5e5d5b58c15f9b8"/>
  </div>

  <div class="filters">
    <div class="fc"><label>Min price $<small>stock floor</small></label><input type="number" id="f-minp" value="5" min="0" max="10000" step="1"/></div>
    <div class="fc"><label>Max price $<small>stock ceiling</small></label><input type="number" id="f-maxp" value="1000" min="0" max="100000" step="10"/></div>
    <div class="fc"><label>Max off high %<small>52w filter</small></label><input type="number" id="f-high" value="70" min="5" max="100" step="5"/></div>
    <div class="fc"><label>Top N pass 1<small>to chain scan</small></label><input type="number" id="f-topn1" value="60" min="10" max="400" step="10"/></div>
    <div class="fc"><label>Min DTE<small>365+ = LEAP</small></label><input type="number" id="f-dte" value="365" min="180" max="730" step="30"/></div>
    <div class="fc"><label>Delta range<small>0.75-0.87</small></label>
      <div style="display:flex;gap:4px"><input type="number" id="f-dmin" value="0.75" min="0.5" max="0.95" step="0.01" style="width:50%"/><input type="number" id="f-dmax" value="0.87" min="0.5" max="0.99" step="0.01" style="width:50%"/></div>
    </div>
    <div class="fc"><label>Max extrinsic %<small>15% cap</small></label><input type="number" id="f-extr" value="15" min="5" max="35" step="1"/></div>
    <div class="fc"><label>Max IV<small>0.65 buy zone</small></label><input type="number" id="f-iv" value="0.80" min="0.10" max="3.0" step="0.05"/></div>
    <div class="fc"><label>Min OI<small>500+ institutional</small></label><input type="number" id="f-oi" value="300" min="50" max="5000" step="50"/></div>
    <div class="fc"><label>Max spread %<small>2% = tight</small></label><input type="number" id="f-sp" value="3" min="0.5" max="15" step="0.5"/></div>
    <div class="fc"><label>Concurrency<small>parallel chains</small></label><input type="number" id="f-conc" value="8" min="1" max="20" step="1"/></div>
    <div class="fc"><label>Show top N<small>output rows</small></label>
      <select id="f-show"><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option></select>
    </div>
  </div>

  <div class="btn-row">
    <button class="scan-btn" id="scan-btn" onclick="runScan()">&#9654; SCAN ALL</button>
    <button class="stop-btn" id="stop-btn" onclick="stopScan()" style="display:none">&#9632; STOP</button>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap" style="display:none">
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-text">
    <span id="prog-left"></span>
    <span id="prog-right"></span>
  </div>
</div>

<div class="status" id="status"><div class="dot"></div><span id="status-txt">Ready. Scan all tickers or enter custom list.</span></div>

<div id="results">
  <div class="empty"><div class="big">&#9670;</div><div>No scan running.</div></div>
</div>

</div>

<!-- ORDER MODAL -->
<div class="modal" id="order-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">BUY TO OPEN</div>
    <div class="modal-contract" id="ord-contract"></div>
    <div class="mr"><label>Current Mid</label><span id="ord-mid"></span></div>
    <div class="mr"><label>Quantity</label><input type="number" id="ord-qty" value="1" min="1" max="999"/></div>
    <div class="mr"><label>Start Price</label><input type="number" id="ord-price" step="0.05" oninput="updateMaxPrice()"/></div>
    <div class="mr"><label>Increment</label><span>$0.05 / attempt</span></div>
    <div class="mr"><label>Max Attempts</label><input type="number" id="ord-attempts" value="50" min="1" max="100" oninput="updateMaxPrice()"/></div>
    <div class="mr"><label>Max Price</label><span id="ord-max" style="color:var(--am)"></span></div>
    <div class="modal-actions">
      <button class="btn-exec" id="btn-exec" onclick="executeOrder()">EXECUTE</button>
      <button class="btn-close" onclick="closeOrderModal()">CANCEL</button>
    </div>
    <div class="ord-status" id="ord-status"></div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const IS_LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const SANDBOX_KEY = '5eebf62a6678b05dc5e5d5b58c15f9b8';

// ── TICKERS ──────────────────────────────────────────────────────────────
const LISTS={
'PICKS':'NVDA,PLTR,MRVL,MU,AMZN,MSFT,GOOGL,AMD,SMCI,ZS,COHR,AAOI,LITE,GLW,KTOS,AVAV,RTX,NOC,LMT,AMAT,LRCX,META,TSLA,ARM,CRWD,DDOG,NET,IONQ,ASTS,RKLB,MARA,RIOT,CLSK',
'MAG7':'AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA',
'SEMIS':'NVDA,AMD,AMAT,LRCX,KLAC,SNPS,CDNS,MRVL,ARM,SMCI,MU,INTC,QCOM,NXPI,ADI,TER,AVGO,TSM,ASML',
'DEF':'KTOS,AVAV,PLTR,RTX,NOC,LMT,GD,HWM,TDG,BA,HAL,GEV,LHX,AXON',
'FIB':'LITE,COHR,AAOI,GLW,MRVL,CIEN,VIAV',
'QC':'IONQ,QUBT,RGTI,QBTS',
'CRYPTO':'MARA,RIOT,CLSK,CIFR,CORZ,IREN,COIN,HOOD,WULF,BTBT,MSTR',
'SPACE':'JOBY,ACHR,LUNR,ASTS,RKLB,RIVN,LCID,RCAT,ONDS,UMAC,RDW,SPCE',
'SAAS':'CRM,NOW,SNOW,DDOG,NET,ZS,TEAM,MDB,WDAY,GTLB,CFLT,OKTA,TWLO,HUBS,VEEV,DOCU',
'CYBER':'CRWD,PANW,FTNT,ZS,OKTA,S,TENB,VRNS,CYBR',
'ENERGY':'XOM,CVX,COP,EOG,OXY,DVN,HAL,SLB,AR,RRC,EQT,FANG,OVV',
'FIN':'SQ,COIN,HOOD,AFRM,SOFI,PYPL,BILL,UPST,NU,CPNG,IBKR,SCHW',
'URAN':'UUUU,CCJ,DNN,LEU,UEC',
'W1':'AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA,AVGO,ORCL,CRM,AMD,ADBE,CSCO,ACN,IBM,INTC,INTU,NOW,QCOM,TXN,AMAT,ADI,LRCX,KLAC,SNPS,CDNS,MCHP,FTNT,PANW,CRWD,WDAY,MRVL,MU,HPQ,HPE,DELL,NTAP,WDC,STX,ZBRA,TER,SMCI,ARM,PLTR,SNOW,DDOG,NET,ZS,TEAM,MDB',
'W2':'HUBS,VEEV,DOCU,OKTA,TWLO,TTD,U,RBLX,SNAP,PINS,SHOP,SQ,COIN,HOOD,AFRM,SOFI,MARA,RIOT,CLSK,JPM,V,MA,BAC,WFC,GS,MS,SPGI,BLK,C,SCHW,CB,MMC,PGR,ICE,CME,AON,AJG,MET,AFL,PRU,TRV,ALL,AIG,USB,PNC,TFC,COF,BK,STT,FITB',
'W3':'HBAN,MTB,RF,KEY,CFG,AXP,DFS,SYF,ALLY,FIS,FISV,GPN,PYPL,HD,MCD,NKE,LOW,SBUX,TJX,BKNG,CMG,ORLY,AZO,ROST,MAR,HLT,YUM,DHI,LEN,PHM,TOL,GRMN,POOL,TSCO,BBY,DG,DLTR,ULTA,LULU,F,GM,RIVN,LCID,ABNB,UBER,LYFT,DASH,DKNG,RCL,CCL,NCLH',
'W4':'PG,KO,PEP,COST,WMT,PM,MO,MDLZ,CL,KHC,GIS,KR,ADM,TSN,MNST,STZ,CAT,GE,HON,UNP,UPS,RTX,BA,DE,LMT,MMM,GD,NOC,TDG,ITW,EMR,ETN,PH,ROK,CTAS,FAST,GWW,CSX,NSC,FDX,DAL,UAL,LUV,AAL,WM,RSG,XOM,CVX,COP,EOG,SLB',
'W5':'MPC,PSX,VLO,OXY,DVN,HAL,BKR,KMI,WMB,OKE,LNG,NEE,DUK,SO,SRE,AEP,EXC,XEL,ED,PLD,AMT,CCI,EQIX,PSA,DLR,O,WELL,SPG,VICI,AVB,EQR,LIN,APD,SHW,ECL,FCX,NEM,NUE,STLD,VMC,MLM,DOW,DD,PPG,ALB,DIS,CMCSA,NFLX,T,VZ,TMUS,CHTR',
'W6':'EA,TTWO,WBD,PARA,MTCH,ROKU,LYV,BABA,NIO,XPEV,JD,PDD,BIDU,TSM,ASML,SONY,SAP,GME,AMC,TLRY,CGC,SPCE,OPEN,UPST,AI,IONQ,QUBT,RGTI,PATH,CFLT,GTLB,ESTC,BILL,PCOR,CELH,DUOL,CAVA,TOST,SOUN,JOBY,ACHR,LUNR,ASTS,RKLB,FSLR,RUN,PLUG,BE,NU,MELI,AXON',
'W7':'CORZ,IREN,WULF,BTBT,CLSK,CIFR,MARA,RIOT,KTOS,AVAV,HWM,GEV,AMAT,LRCX,TER,UUUU,CCJ,DNN,COHR,AAOI,LITE,GLW,MRVL,UMAC,ONDS,RDW,RCAT,APP,RDDT,IBKR,KKR,APO,BX,ARES,EQT,AR,RRC,CNX,OKLO,NNE,SMR,IONQ,QUBT,RGTI,QBTS,CRWV,CRCL,NBIS,ALAB,CRDO'
};
const ALL_TICKERS=[...new Set(Object.values(LISTS).flatMap(v=>v.split(',')))];

// ── STATE ────────────────────────────────────────────────────────────────
let scanRunning=false, aborted=false, allResults=[], sortCol='score', sortDir=-1;
let currentOrder=null, orderAborted=false, serverCfg=null;

// ── INIT ─────────────────────────────────────────────────────────────────
(function init(){
  const badge=document.getElementById('mode-badge');
  if(IS_LOCAL){
    badge.className='local-badge';
    badge.textContent='LOCALHOST · TRADING ON';
    document.getElementById('api-section').style.display='none';
    fetch('/api/config').then(r=>r.json()).then(c=>{serverCfg=c;}).catch(()=>{});
  } else {
    badge.className='local-badge';
    badge.style.borderColor='var(--am)';badge.style.color='var(--am)';
    badge.textContent='SANDBOX · READ ONLY';
    document.getElementById('api-section').style.display='flex';
  }
  document.getElementById('ticker-count').textContent=ALL_TICKERS.length+' tickers';
  document.getElementById('tickers-input').addEventListener('input',function(){
    const v=this.value.trim();
    if(!v) document.getElementById('ticker-count').textContent=ALL_TICKERS.length+' tickers';
    else document.getElementById('ticker-count').textContent=new Set(v.toUpperCase().split(',').map(s=>s.trim()).filter(Boolean)).size+' tickers';
  });
})();

// ── API ──────────────────────────────────────────────────────────────────
async function trad(ep,params={}){
  const qs=new URLSearchParams(params).toString();
  if(IS_LOCAL){
    const r=await fetch('/api/tradier/'+ep+'?'+qs);
    if(!r.ok) throw new Error('API '+r.status);
    return r.json();
  } else {
    const key=document.getElementById('api-key')?.value||SANDBOX_KEY;
    const r=await fetch('https://sandbox.tradier.com/v1/'+ep+'?'+qs,{
      headers:{'Authorization':'Bearer '+key,'Accept':'application/json'}
    });
    if(!r.ok) throw new Error('API '+r.status);
    return r.json();
  }
}
async function tradPost(ep,body){
  if(!IS_LOCAL) throw new Error('Trading requires localhost');
  const r=await fetch('/api/tradier/'+ep,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(body).toString()});
  return r.json();
}
async function tradDelete(ep){
  if(!IS_LOCAL) throw new Error('Trading requires localhost');
  const r=await fetch('/api/tradier/'+ep,{method:'DELETE'});
  return r.json();
}

// ── HELPERS ──────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const mid=o=>((o.bid||0)+(o.ask||0))/2;
const extrPct=(o,spot)=>{const m=mid(o),i=Math.max(0,spot-o.strike);return m>0?(Math.max(0,m-i)/m)*100:99;};
const spreadPct=o=>{const m=mid(o);return m>0?((o.ask-o.bid)/m)*100:99;};
const dteDays=e=>Math.round((new Date(e)-new Date())/86400000);
const fmtTime=s=>{const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;};

function bestExp(exps,minDte){
  const now=new Date();
  const valid=(Array.isArray(exps)?exps:[]).filter(e=>Math.round((new Date(e)-now)/86400000)>=minDte).sort();
  const pref=valid.filter(e=>{const d=Math.round((new Date(e)-now)/86400000);return d>=420&&d<=600;});
  return pref[0]||valid[0]||null;
}

// ── CONCURRENT POOL ──────────────────────────────────────────────────────
async function pool(items,fn,concurrency=8){
  let idx=0;
  async function worker(){while(idx<items.length&&!aborted){const i=idx++;try{await fn(items[i],i);}catch(e){}}}
  await Promise.all(Array(Math.min(concurrency,items.length)).fill(0).map(()=>worker()));
}

// ── SCORING ──────────────────────────────────────────────────────────────
function pass1Score(q){
  const spot=q.last,h52=q.week_52_high,l52=q.week_52_low,avgVol=q.average_volume;
  if(!spot||!h52||!l52)return 0;
  const fromHigh=(spot-h52)/h52*100;
  const rpos=(spot-l52)/(h52-l52)*100;
  const vs=avgVol>0?q.volume/avgVol:1;
  let s=0;
  if(fromHigh<=-40)s+=40;else if(fromHigh<=-30)s+=32;else if(fromHigh<=-20)s+=22;else if(fromHigh<=-10)s+=12;else if(fromHigh<=-5)s+=5;
  if(rpos<20)s+=30;else if(rpos<35)s+=22;else if(rpos<50)s+=14;else if(rpos<65)s+=7;
  if(vs>=2)s+=20;else if(vs>=1.5)s+=15;else if(vs>=1.2)s+=8;
  s+=Math.min(10,q.average_volume/1000000);
  return Math.min(100,s);
}

function computeGEX(opts,spot){
  const sm={};
  for(const o of opts){
    const g=o.greeks||{},gamma=parseFloat(g.gamma)||0,oi=parseInt(o.open_interest)||0,strike=parseFloat(o.strike)||0;
    const gex=gamma*oi*100*spot*spot*0.01;
    if(!sm[strike])sm[strike]={cg:0,pg:0,coi:0,poi:0,cv:0};
    if(o.option_type==='call'){sm[strike].cg+=gex;sm[strike].coi+=oi;sm[strike].cv+=parseInt(o.volume)||0;}
    else{sm[strike].pg+=gex;sm[strike].poi+=oi;}
  }
  const strikes=Object.keys(sm).map(Number).filter(s=>sm[s].cg+sm[s].pg>0);
  if(!strikes.length)return{putWall:0,callWall:0,maxPain:0,uoa:[]};
  const putWall=strikes.reduce((a,b)=>sm[a].pg>sm[b].pg?a:b);
  const callWall=strikes.reduce((a,b)=>sm[a].cg>sm[b].cg?a:b);
  const maxPain=strikes.reduce((best,s)=>{const pain=strikes.reduce((t,s2)=>t+Math.max(0,s2-s)*sm[s2].coi+Math.max(0,s-s2)*sm[s2].poi,0);return(!best||pain<best.pain)?{strike:s,pain}:best;},null)?.strike||0;
  const uoa=strikes.filter(s=>sm[s].coi>50&&sm[s].cv>0&&sm[s].cv/Math.max(sm[s].coi,1)>1.5&&s>spot*.7&&s<spot*1.4).map(s=>({strike:s,ratio:+(sm[s].cv/Math.max(sm[s].coi,1)).toFixed(1)})).sort((a,b)=>b.ratio-a.ratio).slice(0,3);
  return{putWall,callWall,maxPain,uoa};
}

function scoreLeap(o,spot,gex,qData,p){
  const d=Math.abs(parseFloat(o.greeks?.delta)||0);
  const iv=parseFloat(o.greeks?.mid_iv)||0;
  const oi=parseInt(o.open_interest)||0;
  const ep=extrPct(o,spot);const sp=spreadPct(o);
  const strike=parseFloat(o.strike)||0;
  const dte=dteDays(o.expiration_date);
  if(d<p.dmin-.04||d>p.dmax+.04)return null;
  if(iv>p.iv*1.4)return null;
  if(oi<p.oi*.5)return null;
  if(ep>p.extr+6)return null;
  if(sp>p.sp+2)return null;
  if(dte<p.dte-45)return null;
  const fromHigh=qData.week_52_high>0?((spot-qData.week_52_high)/qData.week_52_high)*100:0;
  let score=0;const tags=[];
  if(gex.putWall){const dist=Math.abs(strike-gex.putWall);score+=Math.max(0,28-dist*1.3);if(dist<=10)tags.push('GEX');}else score+=14;
  if(iv<=.30)score+=20;else if(iv<=.40)score+=17;else if(iv<=.50)score+=13;else if(iv<=.60)score+=8;else if(iv<=.70)score+=4;else if(iv<=.80)score+=1;else tags.push('IV↑');
  if(fromHigh<=-40)score+=18;else if(fromHigh<=-30)score+=15;else if(fromHigh<=-20)score+=11;else if(fromHigh<=-10)score+=6;else if(fromHigh<=-5)score+=3;
  if(ep<=8)score+=15;else if(ep<=10)score+=13;else if(ep<=12)score+=10;else if(ep<=15)score+=7;else if(ep<=20)score+=3;
  if(oi>=10000)score+=10;else if(oi>=5000)score+=8;else if(oi>=2000)score+=6;else if(oi>=1000)score+=4;else if(oi>=500)score+=2;
  if(sp<=.8)score+=9;else if(sp<=1.2)score+=7;else if(sp<=1.8)score+=5;else if(sp<=2.5)score+=3;else if(sp<=3.5)score+=1;
  if(gex.maxPain&&Math.abs(strike-gex.maxPain)<=10)score+=3;
  if(gex.uoa?.some(u=>Math.abs(u.strike-strike)<5))tags.push('UOA');
  const vs=qData.average_volume>0?qData.volume/qData.average_volume:1;
  if(vs>=2){score+=2;tags.push('VOL');}
  return{score:Math.min(100,Math.round(score)),d,iv,ep,sp,oi,strike,fromHigh,tags,dte};
}

// ── UI HELPERS ───────────────────────────────────────────────────────────
function setStatus(msg,state){
  const el=$('status');el.className='status '+(state||'');
  $('status-txt').textContent=msg;
}
function showProgress(completed,total,contracts,eta){
  $('prog-wrap').style.display='block';
  const pct=total>0?Math.round(completed/total*100):0;
  $('prog-fill').style.width=pct+'%';
  $('prog-left').textContent=completed+'/'+total+' tickers · '+contracts+' contracts';
  $('prog-right').textContent=eta>0?'ETA '+fmtTime(eta):'';
}
function hideProgress(){$('prog-wrap').style.display='none';$('prog-fill').style.width='0';}

// ── MAIN SCAN ────────────────────────────────────────────────────────────
async function runScan(){
  if(scanRunning)return;
  scanRunning=true;aborted=false;allResults=[];

  const input=$('tickers-input').value.trim();
  const tickers=input?[...new Set(input.toUpperCase().split(',').map(s=>s.trim()).filter(Boolean))]:ALL_TICKERS.slice();

  const p={
    minPrice:+$('f-minp').value||0,
    maxPrice:+$('f-maxp').value||Infinity,
    maxFromHigh:+$('f-high').value,
    topN1:+$('f-topn1').value,
    dte:+$('f-dte').value,
    dmin:+$('f-dmin').value,
    dmax:+$('f-dmax').value,
    extr:+$('f-extr').value,
    iv:+$('f-iv').value,
    oi:+$('f-oi').value,
    sp:+$('f-sp').value,
    show:+$('f-show').value,
    conc:+$('f-conc').value||8,
  };

  $('scan-btn').style.display='none';
  $('stop-btn').style.display='block';
  $('results').innerHTML='';
  const t0=Date.now();

  // ── PASS 1: BATCH QUOTES ──────────────────────────────────────────────
  setStatus('PASS 1 — fetching quotes for '+tickers.length+' tickers...','running');
  const BATCH=500;
  const qMap={};
  const batches=[];
  for(let i=0;i<tickers.length;i+=BATCH)batches.push(tickers.slice(i,i+BATCH));

  for(let bi=0;bi<batches.length;bi++){
    if(aborted)break;
    setStatus('PASS 1 — quotes batch '+(bi+1)+'/'+batches.length,'running');
    showProgress(bi,batches.length,0,0);
    try{
      const raw=await trad('markets/quotes',{symbols:batches[bi].join(','),greeks:'false'});
      const arr=raw?.quotes?.quote;
      const list=Array.isArray(arr)?arr:arr?[arr]:[];
      list.filter(q=>q?.symbol).forEach(q=>qMap[q.symbol]=q);
    }catch(e){setStatus('PASS 1 error: '+e.message,'err');}
  }

  if(aborted)return finish(t0,p);

  // Filter by price + score
  const scored1=tickers
    .filter(t=>{
      const q=qMap[t];
      if(!q?.last||!q?.week_52_high)return false;
      if(q.last<p.minPrice||q.last>p.maxPrice)return false;
      return true;
    })
    .map(t=>({sym:t,q:qMap[t],p1:pass1Score(qMap[t])}))
    .filter(x=>{
      const fh=x.q.week_52_high>0?((x.q.last-x.q.week_52_high)/x.q.week_52_high)*100:0;
      return Math.abs(fh)<=p.maxFromHigh||fh>=0;
    })
    .sort((a,b)=>b.p1-a.p1)
    .slice(0,p.topN1);

  setStatus('PASS 1 done — '+Object.keys(qMap).length+' quoted, '+scored1.length+' to chain scan','running');

  // ── PASS 2: CONCURRENT CHAIN SCAN ─────────────────────────────────────
  let completed=0;
  const total=scored1.length;
  const scanStart=Date.now();

  await pool(scored1,async(item)=>{
    if(aborted)return;
    try{
      const expRaw=await trad('markets/options/expirations',{symbol:item.sym,includeAllRoots:'true'});
      const exps=expRaw?.expirations?.date||(Array.isArray(expRaw)?expRaw:[]);
      const exp=bestExp(exps,p.dte);
      if(!exp){completed++;return;}

      const chainRaw=await trad('markets/options/chains',{symbol:item.sym,expiration:exp,greeks:'true'});
      const opts=chainRaw?.options?.option||(Array.isArray(chainRaw)?chainRaw:[]);
      if(!opts.length){completed++;return;}

      const spot=item.q.last;
      const gex=computeGEX(opts,spot);
      const calls=opts.filter(o=>o.option_type==='call'&&o.greeks);

      for(const o of calls){
        const s=scoreLeap(o,spot,gex,item.q,p);
        if(!s)continue;
        allResults.push({
          sym:item.sym,desc:item.q.description||item.sym,spot,
          strike:o.strike,exp:o.expiration_date,dte:s.dte,
          premium:mid(o),bid:o.bid||0,delta:s.d,iv:s.iv,extr:s.ep,spread:s.sp,
          oi:s.oi,fromHigh:s.fromHigh,score:s.score,tags:s.tags,
          putWall:gex.putWall,maxPain:gex.maxPain,p1:item.p1,
          optSym:o.symbol
        });
      }
    }catch(e){}

    completed++;
    const elapsed=(Date.now()-scanStart)/1000;
    const rate=completed/elapsed;
    const remaining=total-completed;
    const eta=rate>0?remaining/rate:0;
    setStatus('PASS 2 — '+item.sym+' ('+completed+'/'+total+')','running');
    showProgress(completed,total,allResults.length,eta);
  },p.conc);

  finish(t0,p);
}

function finish(t0,p){
  scanRunning=false;
  $('scan-btn').style.display='block';
  $('stop-btn').style.display='none';
  if(t0&&p){
    allResults.sort((a,b)=>b.score-a.score);
    render(allResults.slice(0,p.show),p);
    const elapsed=((Date.now()-t0)/1000).toFixed(1);
    if(aborted) setStatus('STOPPED — '+allResults.length+' contracts found in '+elapsed+'s','err');
    else setStatus('DONE — '+allResults.length+' contracts · '+elapsed+'s','done');
  } else {
    setStatus('Stopped.','err');
  }
  setTimeout(hideProgress,1500);
}

function stopScan(){
  aborted=true;
  setStatus('Stopping...','err');
}

// ── RENDER ───────────────────────────────────────────────────────────────
function resort(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  allResults.sort((a,b)=>{let av=a[col],bv=b[col];if(typeof av==='string')av=av.toLowerCase(),bv=bv.toLowerCase();return sortDir*(av<bv?-1:av>bv?1:0);});
  render(allResults.slice(0,+$('f-show').value),{iv:+$('f-iv').value,extr:+$('f-extr').value,oi:+$('f-oi').value});
}

function render(rows,p){
  if(!rows.length){$('results').innerHTML='<div class="empty"><div class="big">&#9670;</div><div>No contracts passed filters.</div></div>';return;}
  const avgScore=(rows.reduce((a,r)=>a+r.score,0)/rows.length).toFixed(1);
  const avgIV=(rows.reduce((a,r)=>a+r.iv,0)/rows.length*100).toFixed(0);
  const avgDTE=Math.round(rows.reduce((a,r)=>a+r.dte,0)/rows.length);
  const syms=new Set(rows.map(r=>r.sym)).size;

  const cols=[
    {k:'score',l:'Score'},{k:'sym',l:'Ticker'},{k:'strike',l:'Strike'},
    {k:'exp',l:'Expiry'},{k:'dte',l:'DTE'},{k:'premium',l:'Premium'},
    {k:'delta',l:'Delta'},{k:'iv',l:'IV'},{k:'extr',l:'Extr%'},
    {k:'spread',l:'Sprd%'},{k:'oi',l:'OI'},{k:'fromHigh',l:'Off Hi'},
    {k:'putWall',l:'Put Wall'}
  ];

  const thead=cols.map(c=>{
    const on=sortCol===c.k?'sorted':'';
    const arr=sortCol===c.k?(sortDir===-1?'↓':'↑'):'↕';
    return'<th class="'+on+'" onclick="resort(\''+c.k+'\')">'+c.l+'<span class="sa">'+arr+'</span></th>';
  }).join('')+'<th>'+( IS_LOCAL?'ORDER':'')+'</th>';

  const tbody=rows.map((r,i)=>{
    const gold=i<3?'top3':'';
    const sc=r.score;
    const sfill=sc>=70?'var(--gr)':sc>=50?'var(--am)':'var(--re)';
    const scolor=sc>=70?'ok':sc>=50?'warn':'bad';
    const tagH=r.tags.map(t=>'<span class="tag tag-'+(t==='GEX'?'gex':t==='UOA'?'uoa':t==='VOL'?'vol':'iv')+'">'+t+'</span>').join('');
    const buyBtn=IS_LOCAL?'<button class="buy-btn" onclick="openOrderModal('+i+')">BUY</button>':'';
    return'<tr class="'+gold+'">'+
      '<td><div class="score-w"><span class="score-n '+scolor+'">'+r.score+'</span><div class="score-bg"><div class="score-fl" style="width:'+sc+'%;background:'+sfill+'"></div></div></div></td>'+
      '<td><span class="rk">#'+(i+1)+'</span> <span class="sym">'+r.sym+'</span>'+tagH+'<span class="desc">'+r.desc+'</span></td>'+
      '<td class="wht">$'+r.strike+'</td>'+
      '<td class="dim">'+r.exp+'</td>'+
      '<td class="'+(r.dte>=450?'ok':r.dte>=365?'warn':'bad')+'">'+r.dte+'</td>'+
      '<td class="wht">$'+r.premium.toFixed(2)+'</td>'+
      '<td class="'+(r.delta>=.75&&r.delta<=.85?'ok':'warn')+'">'+r.delta.toFixed(3)+'</td>'+
      '<td class="'+(r.iv<=.40?'ok':r.iv<=.60?'warn':'bad')+'">'+(r.iv*100).toFixed(0)+'%</td>'+
      '<td class="'+(r.extr<=12?'ok':r.extr<=18?'warn':'bad')+'">'+r.extr.toFixed(1)+'%</td>'+
      '<td class="'+(r.spread<=1.5?'ok':r.spread<=2.5?'warn':'bad')+'">'+r.spread.toFixed(1)+'%</td>'+
      '<td class="'+(r.oi>=2000?'ok':r.oi>=500?'warn':'dim')+'">'+r.oi.toLocaleString()+'</td>'+
      '<td class="'+(r.fromHigh<=-30?'ok':r.fromHigh<=-15?'warn':'bad')+'">'+r.fromHigh.toFixed(1)+'%</td>'+
      '<td class="'+(r.putWall?'ok':'dim')+'">'+(r.putWall?'$'+r.putWall:'—')+'</td>'+
      '<td>'+buyBtn+'</td>'+
    '</tr>';
  }).join('');

  $('results').innerHTML=
    '<div class="results-hdr">'+
      '<div class="stat"><div class="stat-l">CONTRACTS</div><div class="stat-v sv-g">'+rows.length+'</div></div>'+
      '<div class="stat"><div class="stat-l">TICKERS</div><div class="stat-v sv-w">'+syms+'</div></div>'+
      '<div class="stat"><div class="stat-l">AVG SCORE</div><div class="stat-v sv-gr">'+avgScore+'</div></div>'+
      '<div class="stat"><div class="stat-l">AVG IV</div><div class="stat-v sv-w">'+avgIV+'%</div></div>'+
      '<div class="stat"><div class="stat-l">AVG DTE</div><div class="stat-v sv-w">'+avgDTE+'d</div></div>'+
    '</div>'+
    '<div class="legend">'+
      '<span style="color:var(--t3)">TAGS:</span>'+
      '<span class="le"><span class="led" style="background:var(--gr)"></span>GEX put wall</span>'+
      '<span class="le"><span class="led" style="background:#bb86fc"></span>UOA unusual OI</span>'+
      '<span class="le"><span class="led" style="background:var(--am)"></span>VOL 2x+ avg</span>'+
      '<span class="le"><span class="led" style="background:var(--re)"></span>IV↑ high IV</span>'+
      '<span style="margin-left:auto;color:var(--t3)">click headers to sort</span>'+
    '</div>'+
    '<div class="tbl-wrap"><table><thead><tr>'+thead+'</tr></thead><tbody>'+tbody+'</tbody></table></div>';
}

// ── ORDER MODAL ──────────────────────────────────────────────────────────
function openOrderModal(idx){
  if(!IS_LOCAL){alert('Trading requires localhost server.');return;}
  const r=allResults[idx];
  currentOrder=r;orderAborted=false;
  $('ord-contract').textContent=r.sym+' $'+r.strike+'C '+r.exp;
  $('ord-mid').textContent='bid $'+r.bid.toFixed(2)+' / mid $'+r.premium.toFixed(2);
  $('ord-price').value=r.bid.toFixed(2);
  $('ord-status').textContent='';$('ord-status').className='ord-status';
  $('btn-exec').disabled=false;
  updateMaxPrice();
  $('order-modal').style.display='flex';
}
function closeOrderModal(){orderAborted=true;$('order-modal').style.display='none';currentOrder=null;}
function updateMaxPrice(){
  const start=+$('ord-price').value||0;
  const att=+$('ord-attempts').value||50;
  $('ord-max').textContent='$'+(start+att*0.05).toFixed(2);
}

async function executeOrder(){
  if(!currentOrder||!serverCfg?.account_id)return;
  const r=currentOrder;
  const qty=+$('ord-qty').value;
  let price=+$('ord-price').value;
  const maxAttempts=+$('ord-attempts').value;
  orderAborted=false;
  $('btn-exec').disabled=true;
  const statusEl=$('ord-status');

  for(let i=1;i<=maxAttempts&&!orderAborted;i++){
    statusEl.textContent='['+i+'/'+maxAttempts+'] limit $'+price.toFixed(2)+' ...';
    statusEl.className='ord-status running';

    try{
      const resp=await tradPost('accounts/'+serverCfg.account_id+'/orders',{
        'class':'option',symbol:r.sym,option_symbol:r.optSym,
        side:'buy_to_open',quantity:qty,type:'limit',
        price:price.toFixed(2),duration:'day'
      });
      const oid=resp?.order?.id;
      if(!oid){statusEl.textContent='ERROR: '+(resp?.errors?.error||JSON.stringify(resp)).slice(0,200);statusEl.className='ord-status error';$('btn-exec').disabled=false;return;}

      await new Promise(r=>setTimeout(r,3000));
      if(orderAborted)break;

      const check=await trad('accounts/'+serverCfg.account_id+'/orders/'+oid);
      const st=check?.order?.status;
      if(st==='filled'){statusEl.textContent='FILLED $'+price.toFixed(2)+' | #'+oid;statusEl.className='ord-status filled';$('btn-exec').disabled=false;return;}
      if(st==='partially_filled'){statusEl.textContent='PARTIAL $'+price.toFixed(2)+' | continuing...';}

      await tradDelete('accounts/'+serverCfg.account_id+'/orders/'+oid);
      price=Math.round((price+0.05)*100)/100;
    }catch(e){
      statusEl.textContent='ERROR: '+e.message;statusEl.className='ord-status error';
      $('btn-exec').disabled=false;return;
    }
  }

  if(orderAborted){statusEl.textContent='CANCELLED';statusEl.className='ord-status';}
  else{statusEl.textContent='NOT FILLED after '+maxAttempts+' attempts (final $'+price.toFixed(2)+')';statusEl.className='ord-status error';}
  $('btn-exec').disabled=false;
}
